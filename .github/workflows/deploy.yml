name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # 1. Build and Deploy Backend (Including Scraper)
      - name: Build and Push Backend
        run: |
          cp -r scraper_service backend/scraper_service
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/scholarhub/backend:${{ github.sha }} ./backend
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/scholarhub/backend:${{ github.sha }}

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: scholarhub-backend
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/scholarhub/backend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: "--allow-unauthenticated"
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            SCRAPER_KEY=${{ secrets.SCRAPER_KEY }}
            NODE_ENV=production

      # 2. Build and Deploy AI Service
      - name: Build and Push AI Service
        run: |
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/scholarhub/ai-service:${{ github.sha }} ./ai_service
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/scholarhub/ai-service:${{ github.sha }}

      - name: Deploy AI Service to Cloud Run
        id: deploy-ai
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: scholarhub-ai-service
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/scholarhub/ai-service:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: "--memory=2Gi --cpu=1 --timeout=300s --allow-unauthenticated"
          env_vars: |
            HF_API_TOKEN=${{ secrets.HF_API_TOKEN }}
            BACKEND_URL=${{ steps.deploy-backend.outputs.url }}/api

      # 3. Build and Deploy Frontend
      - name: Build and Push Frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }}/api \
            --build-arg NEXT_PUBLIC_AI_URL=${{ steps.deploy-ai.outputs.url }} \
            -t us-central1-docker.pkg.dev/$PROJECT_ID/scholarhub/frontend:${{ github.sha }} ./frontend
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/scholarhub/frontend:${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: scholarhub-frontend
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/scholarhub/frontend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: "--memory=1Gi --allow-unauthenticated"
          env_vars: |
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }}/api
            NEXT_PUBLIC_AI_URL=${{ steps.deploy-ai.outputs.url }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            NODE_ENV=production


      # 4. Final Wiring: Connect NextAuth and CORS for all services
      - name: Wiring Frontend and Backend
        run: |
          # Fix NextAuth Redirects
          gcloud run services update scholarhub-frontend \
            --platform managed --region ${{ env.REGION }} \
            --update-env-vars NEXTAUTH_URL=${{ steps.deploy-frontend.outputs.url }}
          
          # Fix Backend CORS and AI connection
          gcloud run services update scholarhub-backend \
            --platform managed --region ${{ env.REGION }} \
            --update-env-vars FRONTEND_URL=${{ steps.deploy-frontend.outputs.url }},AI_SERVICE_URL=${{ steps.deploy-ai.outputs.url }}


          # Fix AI Service CORS to allow Frontend traffic
          gcloud run services update scholarhub-ai-service \
            --platform managed --region ${{ env.REGION }} \
            --update-env-vars FRONTEND_URL=${{ steps.deploy-frontend.outputs.url }}
